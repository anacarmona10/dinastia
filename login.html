<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="style_login.css">
</head>

<body>

<div class="login-container">

    <h2>Iniciar Sesión</h2>

    <form action="api/login.php" method="POST">

        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="correo" id="correo" name="correo" placeholder="Ingresa tu correo" required>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="contraseña" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit">Ingresar</button>

        <p class="registro">
            ¿No tienes cuenta? <a href="Registro.html">Regístrate</a>
        </p>

    </form>

</div>

</body>
</html>
